<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Icon Sizes Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Icon Button Sizes</h2>
        <div class="row">
            <button class="btn-icon btn-icon--sm" aria-label="Small search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
            </button>
            <span>sm</span>
        </div>
        <div class="row">
            <button class="btn-icon btn-icon--md" aria-label="Medium search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
            </button>
            <span>md</span>
        </div>
        <div class="row">
            <button class="btn-icon btn-icon--lg" aria-label="Large search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
            </button>
            <span>lg</span>
        </div>
    </div>
</body>
</html>
